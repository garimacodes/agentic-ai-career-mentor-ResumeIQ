<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up</title>
    <style>
        body {
            font-family: 'Times New Roman', Times, serif;
            background-image: url("https://img.freepik.com/premium-vector/simply-background_591079-12.jpg?w=1800");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            margin:0;
            padding:0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            background-color: beige;
            border-radius: 30px;
            padding: 40px;
            width: 400px;
            box-shadow: 2px 2px 10px rgba(0, 0, 0, 0.2);
        }
        h2{
            color: #34623F;;
            text-align: center;
            margin-bottom: 20px;
        }
        form{
            display: flex;
            flex-direction: column;
        }
        input{
            margin-bottom: 50px;
            color:black;
            padding: 10px;
            border-radius: 8px;
        }
        button{
            background-color: #A1E5AB;
            color: black;
            padding: 10px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-weight: bold;
        }
        button:hover{
            background-color: aquamarine;
        }
    </style>
    <script>
    function validateForm(event) {
        event.preventDefault();
        let password = document.getElementById("password").value;
        let confirmPassword = document.getElementById("confirm_password").value;
        let errorDiv = document.getElementById("error-message");

        if (password !== confirmPassword) {
            errorDiv.textContent = "Passwords do not match!";
        } else {
            errorDiv.textContent = "";
            event.target.submit();  // Submit the form if validation passes
        }
    }
</script>
</head>
<body>
    <div class="container">
        <h2>Create New Account</h2>
        <form action="/signup" method="POST" onsubmit="validateForm(event)">
            <input type="text" name="username" placeholder="Username" required>
            <input type="email" name="email" placeholder="Email" required>
            <input type="password" id="password" name="password" placeholder="Password" required>
            <input type="password" id="confirm_password" name="confirm_password" placeholder="Repeat Password" required>
            <div id="error-message" class="error"></div>
            <button type="submit">Sign Up</button>
        </form>
    <div>
        <script src="script.js"></script>

</body>
</html>
